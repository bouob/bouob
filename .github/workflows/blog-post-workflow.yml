name: Latest blog post workflow

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://0x1.now/rss.xml"
          max_post_count: 5
          template: "- [$title]($url) <sub><sup>$date</sup></sub>"
